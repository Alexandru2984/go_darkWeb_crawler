# Dev-only nginx config used inside the frontend container. Real prod traffic
# goes through the host nginx at /etc/nginx/sites-enabled/onion_spider with
# Cloudflare in front — that one owns HSTS, rate limits, real-IP and security
# headers. Keep this minimal: serve static + proxy API.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cap upload size: the largest API request is /api/crawl/bulk (10KB).
    client_max_body_size 32k;

    location /api/ {
        proxy_pass http://api:8900;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Exports can stream for a while — match the API's 10-minute write deadline.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
