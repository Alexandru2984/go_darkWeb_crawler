version: 2

updates:
  # Backend (Go modules)
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Bucharest
    open-pull-requests-limit: 5
    groups:
      go-minor-and-patch:
        update-types: [minor, patch]
    labels:
      - dependencies
      - go

  # Frontend (npm). Major bumps on the Vite + Vue toolchain almost always need
  # manual migration (peer-dep churn, breaking config). Dependabot proposed
  # vite 5 → 8 last cycle and the build failed; we'd rather review those by
  # hand than have CI red on auto-PRs. Minor + patch stay grouped.
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Bucharest
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        update-types: [minor, patch]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - javascript

  # Dockerfiles (base images)
  - package-ecosystem: docker
    directories:
      - /backend
      - /frontend
      - /deploy/tor
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Bucharest
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Bucharest
    open-pull-requests-limit: 5
    groups:
      actions-all:
        patterns: ["*"]
    labels:
      - dependencies
      - github-actions
