name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs (e.g. quick PR pushes) so we don't waste compute.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  go:
    name: Backend (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.25']
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: backend/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test (with race detector)
        run: go test -race -timeout 5m ./...

      - name: go build
        run: go build -ldflags="-s -w" -trimpath -o /tmp/onion-spider-api ./cmd/api

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false  # the lint action manages its own cache

      - name: golangci-lint
        # golangci-lint-action@v7+ is required for golangci-lint v2.x. v6
        # rejects v2 versions with an explicit error.
        # The lint binary must be built with a Go version >= the toolchain
        # required by go.mod (currently 1.25); v2.1.6 was built with Go 1.24
        # and fails with "the Go language version (go1.24) used to build
        # golangci-lint is lower than the targeted Go version (1.25.0)".
        # v2.4.0 was the first v2 release built with Go 1.25; we pin to a
        # known-stable patch above that.
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: backend
          args: --timeout=5m

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: backend
        run: govulncheck ./...

  frontend:
    name: Frontend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22']
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci --no-audit --no-fund

      - name: npm run build
        run: npm run build

  docker:
    name: Docker build (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            context: ./backend
          - image: frontend
            context: ./frontend
          - image: tor
            context: ./deploy/tor
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: false
          tags: onion-spider-${{ matrix.image }}:ci
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
